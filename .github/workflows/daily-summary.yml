name: Daily Horizon Summary

on:
  schedule:
    # GitHub scheduled workflows use UTC. 20:00 UTC is 04:00 Asia/Shanghai;
    # this intentionally runs early to offset the observed schedule delay.
    - cron: '0 22 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon --hours 36

      - name: Commit daily summaries to repository
        run: |
          BJ_DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          echo "BJ_DATE=${BJ_DATE}" >> $GITHUB_ENV
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/summaries/*.md docs/_posts/*.md || true
          if git diff --staged --quiet; then
            echo "No summary changes to commit."
          else
            git commit -m "📝 Daily summaries: ${BJ_DATE}"
            git push
          fi

      - name: Set current date as environment variable
        run: echo "DATE=${BJ_DATE:-$(TZ=Asia/Shanghai date +'%Y-%m-%d')}" >> $GITHUB_ENV

      - name: Sync Chinese summary to Obsidian vault
        if: ${{ vars.OBSIDIAN_SYNC_ENABLED == 'true' }}
        env:
          OBSIDIAN_SYNC_TOKEN: ${{ secrets.OBSIDIAN_SYNC_TOKEN }}
          OBSIDIAN_REPO: ${{ vars.OBSIDIAN_REPO || 'Yancy-gate/obsidian_cloud' }}
          OBSIDIAN_SUMMARY_DIR: ${{ vars.OBSIDIAN_SUMMARY_DIR || '其他/内参日报' }}
        run: |
          TODAY="${BJ_DATE:-$(TZ=Asia/Shanghai date +'%Y-%m-%d')}"
          SUMMARY_FILE="data/summaries/horizon-${TODAY}-zh.md"
          if [ ! -f "$SUMMARY_FILE" ]; then
            # Fallback: newest Chinese summary (legacy UTC-named files)
            SUMMARY_FILE=$(ls -t data/summaries/horizon-*-zh.md 2>/dev/null | head -1 || true)
          fi
          if [ -z "$SUMMARY_FILE" ] || [ ! -f "$SUMMARY_FILE" ]; then
            echo "No Chinese summary found for ${TODAY}, skipping Obsidian sync."
            exit 0
          fi
          git clone "https://x-access-token:${OBSIDIAN_SYNC_TOKEN}@github.com/${OBSIDIAN_REPO}.git" obsidian-vault
          mkdir -p "obsidian-vault/${OBSIDIAN_SUMMARY_DIR}"
          cp "$SUMMARY_FILE" "obsidian-vault/${OBSIDIAN_SUMMARY_DIR}/horizon-${TODAY}-zh.md"
          cd obsidian-vault
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${OBSIDIAN_SUMMARY_DIR}/horizon-${TODAY}-zh.md"
          if git diff --staged --quiet; then
            echo "Obsidian vault already up to date."
          else
            git commit -m "🌅 Horizon daily briefing ${TODAY}"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
